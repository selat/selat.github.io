<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0b0a" />
  <title>Gym</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-apple-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell" id="screen">
    <!-- Screen contents are rendered by app.js based on the hash route. -->
  </main>

  <!-- Bottom tab bar — visible on every screen.
       Five tabs to match Gym: HOME · HISTORY · RECORD · LIBRARY · BODY.
       RECORD is the primary, slightly larger icon, accent color. -->
  <nav class="tab-bar" aria-label="Primary">
    <div class="tab-bar-inner">
      <a class="tab" href="#home" data-route="home">
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.3" stroke-linecap="square" aria-hidden="true">
          <path d="M2.5 7.2 L8 2.5 L13.5 7.2 V13.5 H2.5 Z"/>
        </svg>
        Home
      </a>
      <a class="tab" href="#history" data-route="history">
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.3" stroke-linecap="square" aria-hidden="true">
          <rect x="2.2" y="3.5" width="11.6" height="10.3"/>
          <line x1="2.2" y1="6.5" x2="13.8" y2="6.5"/>
          <line x1="5" y1="2.2" x2="5" y2="4.5"/>
          <line x1="11" y1="2.2" x2="11" y2="4.5"/>
          <rect x="7" y="9" width="2" height="2" fill="currentColor" stroke="none"/>
        </svg>
        History
      </a>
      <a class="tab primary" href="#record" data-route="record">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="0.8" opacity="0.45"/>
          <circle cx="8" cy="8" r="4.2" fill="currentColor"/>
        </svg>
        Record
      </a>
      <a class="tab" href="#library" data-route="library">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="square" aria-hidden="true">
          <rect x="3" y="3" width="2.5" height="10.5"/>
          <rect x="6.7" y="2" width="2.5" height="11.5"/>
          <rect x="10.4" y="4" width="2.5" height="9.5"/>
        </svg>
        Library
      </a>
      <a class="tab" href="#body" data-route="body">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="square" aria-hidden="true">
          <circle cx="8" cy="3.2" r="1.7"/>
          <path d="M8 5.2 L8 10.5"/>
          <path d="M4.5 7.7 L11.5 7.7"/>
          <path d="M5.5 13.5 L8 10.5 L10.5 13.5"/>
        </svg>
        Body
      </a>
    </div>
  </nav>

  <!-- Sheet host: ui code calls openSheet(node) to mount here. -->
  <div id="sheet-host"></div>

  <!-- Sheet markup. Cloned + populated in JS (see ui/session.js openSetEditor). -->
  <template id="tpl-set-editor">
    <div class="set-editor">
      <h2 class="eyebrow">EDIT SET</h2>
      <div class="set-editor-sub muted"></div>
      <div class="grid-2 set-editor-fields">
        <label class="num-field">
          <span class="eyebrow">WEIGHT (KG)</span>
          <input class="input input-lg input-center" type="number" name="weight" inputmode="decimal" step="2.5" min="0">
        </label>
        <label class="num-field">
          <span class="eyebrow">REPS</span>
          <input class="input input-lg input-center" type="number" name="reps" inputmode="numeric" step="1" min="0">
        </label>
      </div>
      <div class="set-editor-opts">
        <div class="settings-row">
          <div class="settings-row-label">
            <strong>Warmup</strong><small>Excluded from charts and recovery.</small>
          </div>
          <label class="switch">
            <input type="checkbox" name="isWarmup">
            <span class="switch-track"></span>
            <span class="switch-thumb"></span>
          </label>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">
            <strong>Per-side weight</strong><small>Volume counts both sides.</small>
          </div>
          <label class="switch">
            <input type="checkbox" name="perSide">
            <span class="switch-track"></span>
            <span class="switch-thumb"></span>
          </label>
        </div>
      </div>
      <div class="settings-actions set-editor-actions">
        <button type="button" class="btn-secondary danger" data-act="delete">DELETE</button>
        <button type="button" class="btn-primary" data-act="save">SAVE</button>
      </div>
    </div>
  </template>

  <!-- Exercise picker sheet (see ui/session.js openExercisePicker). -->
  <template id="tpl-exercise-picker">
    <div class="exercise-picker">
      <h2 class="eyebrow">PICK EXERCISE</h2>
      <input type="search" class="input exercise-picker-search" placeholder="search…">
      <div class="lib-list exercise-picker-list"></div>
    </div>
  </template>

  <!-- One row of the exercise picker; cloned per result. -->
  <template id="tpl-exercise-row">
    <button type="button" class="lib-row">
      <div class="lib-row-head">
        <div class="lib-row-name"><span class="num"></span> <span class="exercise-name"></span></div>
      </div>
      <div class="lib-row-tags"></div>
    </button>
  </template>

  <!-- One timed-exercise config row (TARGET HOLD / REST BETWEEN); cloned per row. -->
  <template id="tpl-config-row">
    <div class="config-row">
      <span class="eyebrow config-row-label"></span>
      <div class="config-row-stepper">
        <button type="button" class="btn-step" data-act="minus">−</button>
        <span class="tnum config-row-value"></span>
        <button type="button" class="btn-step" data-act="plus">+</button>
      </div>
    </div>
  </template>

  <!-- Workout overview screen (see ui/workout.js renderWorkout). The
       template holds the screen's top-level siblings directly (no wrapper)
       so the cloned fragment mounts as direct children of #screen. -->
  <template id="tpl-workout">
    <div class="topbar detail-topbar">
      <button type="button" class="btn-icon lg" data-act="close" aria-label="back to active exercise">×</button>
      <div class="detail-topbar-title">
        <div class="eyebrow">CURRENT WORKOUT</div>
        <div class="title" data-field="split"></div>
      </div>
      <div class="detail-topbar-right">
        <div class="eyebrow">ELAPSED</div>
        <div class="tnum detail-topbar-value" data-field="elapsed"></div>
      </div>
    </div>

    <div class="detail-progress">
      <div class="row-baseline detail-progress-label">
        <span><strong data-field="count"></strong> EXERCISES</span>
        <span data-field="split2"></span>
      </div>
      <div class="progress-strip" data-field="bar">
        <div class="progress-strip-fill" data-field="fill"></div>
      </div>
    </div>

    <div class="divider"><span>── PLAN</span><span class="divider-line"></span></div>

    <div class="workout-plan" data-field="plan">
      <div class="workout-add">
        <button type="button" class="plan-row workout-add-row" data-act="add">
          <span class="plan-row-marker workout-add-marker">+</span>
          <div class="workout-add-label">
            <div class="workout-add-title">ADD EXERCISE</div>
            <div class="muted workout-add-sub">Pick from library</div>
          </div>
          <span class="plan-row-chev">›</span>
        </button>
      </div>
    </div>

    <div class="detail-footer">
      <button type="button" class="btn-primary" data-act="finish"><span>FINISH WORKOUT</span><span>→</span></button>
      <button type="button" class="btn-secondary danger block" data-act="abandon">ABANDON WORKOUT</button>
    </div>
  </template>

  <!-- One row of the workout plan; cloned per entry. -->
  <template id="tpl-plan-row">
    <div class="plan-row">
      <span class="plan-row-marker"></span>
      <div class="plan-row-text">
        <span class="plan-row-name"></span>
        <div class="plan-row-result"></div>
      </div>
      <span class="plan-row-chev">›</span>
    </div>
  </template>

  <!-- Body / recovery-map screen (see ui/body.js renderBody). Multi-child
       fragment (topbar + body-pad) mounted as direct children of #screen. -->
  <template id="tpl-body">
    <div class="topbar">
      <h1 class="title">RECOVERY MAP</h1>
    </div>
    <div class="body-pad">
      <div class="stat-grid cols-3" data-field="summary"></div>

      <div class="body-grid">
        <div class="body-grid-side">
          <span class="label">FRONT</span>
          <div class="diagram" data-field="front"></div>
        </div>
        <div class="body-grid-side">
          <span class="label">BACK</span>
          <div class="diagram" data-field="back"></div>
        </div>
      </div>

      <div class="recovery-legend">
        <span class="lbl">FRESH</span>
        <span class="gradient-bar"></span>
        <span class="lbl">SORE</span>
      </div>

      <div class="divider"><span>── MOST FATIGUED</span><span class="divider-line"></span></div>

      <div class="recovery-bars" data-field="bars"></div>
    </div>
  </template>

  <!-- One row of the "most fatigued" list; cloned per muscle. -->
  <template id="tpl-body-bar-row">
    <div class="recovery-bar-row">
      <span class="lbl"></span>
      <div class="recovery-bar"><div class="recovery-bar-fill"></div></div>
      <span class="pct"></span>
    </div>
  </template>

  <!-- Home screen (see ui/home.js renderHome). Multi-child fragment. -->
  <template id="tpl-home">
    <div data-field="cal"></div>
    <div class="body-pad">
      <div class="divider"><span>── THIS WEEK</span><span class="divider-line"></span></div>
      <div class="stat-grid cols-3" data-field="week"></div>
    </div>
    <div class="body-pad" data-field="today"></div>
    <div class="body-pad section-mt">
      <div class="divider"><span>── RECENT SESSIONS</span><span class="divider-line"></span><span class="divider-right" data-field="recent-count"></span></div>
      <div data-field="recent"></div>
    </div>
  </template>

  <!-- Calendar header (week/month). Nav filled + grid built in JS. -->
  <template id="tpl-cal-header">
    <div class="cal-header">
      <div class="cal-nav">
        <div class="cal-nav-left">
          <button class="cal-arrow" data-act="prev" aria-label="previous">‹</button>
          <span class="cal-month-label" data-field="label"></span>
          <button class="cal-arrow" data-act="next" aria-label="next">›</button>
        </div>
        <div class="cal-nav-right">
          <span class="cal-wk" data-field="wk"></span>
          <button class="cal-toggle" data-act="toggle"></button>
          <button class="cal-toggle" data-act="settings" aria-label="settings">☰</button>
        </div>
      </div>
      <div class="cal-day-letters">
        <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
      </div>
      <div data-field="grid"></div>
    </div>
  </template>

  <!-- One calendar day cell; cloned per day. -->
  <template id="tpl-cal-day">
    <div class="cal-day">
      <span class="cal-day-num"></span>
      <span class="cal-day-dot"></span>
    </div>
  </template>

  <!-- TODAY · SUGGESTED inverse CTA. -->
  <template id="tpl-today-cta">
    <div class="today-cta">
      <div class="row-baseline">
        <span class="eyebrow">TODAY · SUGGESTED</span>
        <span class="eyebrow" data-field="mins"></span>
      </div>
      <div class="row-between">
        <span class="today-cta-title" data-field="title"></span>
        <button type="button" class="today-cta-start" data-act="start">START ▶</button>
      </div>
      <div class="today-cta-why" data-field="why"></div>
    </div>
  </template>

  <!-- TODAY · REST (no suggestion) variant. -->
  <template id="tpl-today-rest">
    <div class="today-cta empty">
      <span class="eyebrow">TODAY · REST</span>
      <p class="today-rest-desc" data-field="desc"></p>
    </div>
  </template>

  <!-- History screen (see ui/history.js renderHistory). Multi-child fragment. -->
  <template id="tpl-history">
    <div class="topbar">
      <div class="topbar-main">
        <h1 class="title">HISTORY</h1>
        <span class="topbar-sub">PAST SESSIONS</span>
      </div>
    </div>
    <div class="body-pad">
      <div class="divider"><span>── LAST 4 WEEKS</span><span class="divider-line"></span></div>
      <div class="stat-grid cols-3" data-field="agg"></div>
    </div>
    <div class="history-list" data-field="list"></div>
  </template>

  <!-- One month header in the history timeline; cloned per group. -->
  <template id="tpl-history-month">
    <div class="history-month-header">
      <span class="history-month-name"></span>
      <span class="dim history-month-count"></span>
    </div>
  </template>

  <!-- One past-session row; cloned per session. -->
  <template id="tpl-session-row">
    <button type="button" class="session-row">
      <div class="session-row-date"></div>
      <div class="session-row-main">
        <span class="session-row-muscles"></span>
        <span class="session-row-chevron">›</span>
      </div>
      <div class="session-row-meta">
        <span data-field="vol"></span>
        <span class="sep">·</span>
        <span data-field="time"></span>
        <span class="sep" data-field="prsep">·</span>
        <span class="pr" data-field="pr"></span>
      </div>
    </button>
  </template>

  <!-- Past-session detail screen (sub-route #session/<id>). Multi-child. -->
  <template id="tpl-past-session">
    <div class="topbar detail-topbar">
      <button type="button" class="btn-icon lg" data-act="close" aria-label="back to history">×</button>
      <div class="detail-topbar-title">
        <div class="eyebrow" data-field="completed"></div>
        <div class="title" data-field="split"></div>
      </div>
      <div class="detail-topbar-right">
        <div class="eyebrow">DURATION</div>
        <div class="tnum detail-topbar-value" data-field="dur"></div>
      </div>
    </div>

    <div class="detail-progress">
      <div class="row-baseline detail-progress-label">
        <span><strong data-field="complete"></strong></span>
        <span><span data-field="dvol"></span><span data-field="dprsep"> · </span><span class="pr" data-field="dpr"></span></span>
      </div>
      <div class="progress-strip"><div class="progress-strip-fill is-complete"></div></div>
    </div>

    <div class="divider"><span>── PLAN</span><span class="divider-line"></span></div>

    <div class="detail-plan" data-field="plan"></div>

    <div class="detail-footer">
      <button type="button" class="btn-primary" data-act="repeat"><span>↻ REPEAT WORKOUT</span><span>→</span></button>
      <button type="button" class="btn-secondary danger block" data-act="delete">⌫ DELETE WORKOUT</button>
    </div>
  </template>

  <!-- Library screen (see ui/library.js renderLibrary). Multi-child fragment. -->
  <template id="tpl-library">
    <div class="topbar">
      <div class="topbar-main">
        <h1 class="title">LIBRARY</h1>
        <span class="topbar-sub" data-field="count"></span>
      </div>
    </div>
    <div class="body-pad">
      <div class="lib-search">
        <span class="lib-search-icon">⌕</span>
        <input type="search" placeholder="search…" data-field="search">
      </div>
      <div class="lib-filters" data-field="filters"></div>
      <div class="lib-list lib-list-spaced" data-field="list"></div>
      <button type="button" class="btn-add lib-add" data-act="add">+ CREATE CUSTOM EXERCISE</button>
    </div>
  </template>

  <!-- Generic toggle pill (filter chips, muscle selectors); cloned per chip. -->
  <template id="tpl-toggle-pill">
    <button type="button" class="pill toggle"></button>
  </template>

  <!-- One library list row; cloned per exercise. -->
  <template id="tpl-lib-row">
    <button type="button" class="lib-row">
      <div class="lib-row-head">
        <div class="lib-row-name"><span class="num"></span> <span class="lib-row-exname"></span></div>
        <span class="lib-row-e1rm"></span>
      </div>
      <div class="lib-row-tags"></div>
    </button>
  </template>

  <!-- Exercise editor sheet (see ui/library.js openExerciseEditor). -->
  <template id="tpl-exercise-editor">
    <div class="exercise-editor">
      <h2 class="eyebrow" data-field="title"></h2>
      <div class="eyebrow ex-ed-name-label">NAME</div>
      <input class="input ex-ed-name" placeholder="e.g. Cable Pullover" data-field="name">
      <div data-field="toggles"></div>
      <div data-field="primary"></div>
      <div data-field="secondary"></div>
      <div class="ex-ed-defaults" data-field="defaults"></div>
      <div class="settings-actions ex-ed-actions" data-field="actions"></div>
    </div>
  </template>

  <!-- Settings-style toggle row (label + hint + switch); cloned per toggle. -->
  <template id="tpl-toggle-row">
    <div class="settings-row">
      <div class="settings-row-label">
        <strong data-field="label"></strong><small data-field="hint"></small>
      </div>
      <label class="switch">
        <input type="checkbox" data-field="cb">
        <span class="switch-track"></span>
        <span class="switch-thumb"></span>
      </label>
    </div>
  </template>

  <!-- Muscle selector group (label + region groups appended). -->
  <template id="tpl-muscle-selector">
    <div class="ex-ed-muscles">
      <div class="eyebrow" data-field="label"></div>
    </div>
  </template>

  <!-- One region within a muscle selector; cloned per region. -->
  <template id="tpl-muscle-region">
    <div class="ex-ed-region">
      <div class="eyebrow dim" data-field="region-label"></div>
      <div class="ex-ed-region-grid" data-field="pills"></div>
    </div>
  </template>

  <!-- Labelled numeric field (eyebrow + centered number input); cloned per field. -->
  <template id="tpl-num-field">
    <label class="num-field">
      <span class="eyebrow" data-field="label"></span>
      <input class="input input-center" type="number" min="0" data-field="input">
    </label>
  </template>

  <!-- Exercise detail screen (sub-route #exercise/<id>). Multi-child. -->
  <template id="tpl-exercise-detail">
    <div class="topbar with-meta">
      <div class="topbar-meta">
        <button type="button" class="topbar-link" data-act="back">‹ LIBRARY</button>
        <button type="button" class="topbar-link" data-act="edit">EDIT</button>
      </div>
      <div class="topbar-main">
        <h1 class="title" data-field="name"></h1>
        <span class="topbar-sub" data-field="hist"></span>
      </div>
    </div>
    <div class="body-pad">
      <div class="detail-tags" data-field="tags"></div>
      <div class="stat-grid cols-2 two-rows detail-stats" data-field="stats"></div>
      <div class="divider"><span>── EST. 1RM · LAST 16W</span><span class="divider-line"></span></div>
      <div data-field="chart"></div>
      <div class="divider"><span>── HISTORY · LOG</span><span class="divider-line"></span></div>
      <div data-field="log"></div>
    </div>
  </template>

  <!-- e1RM chart card shell; the SVG is injected (computed geometry). -->
  <template id="tpl-chart-card">
    <div class="chart-card chart-card-spaced">
      <div class="now-callout" data-field="now"></div>
      <div class="y-axis">
        <span data-field="ymax"></span>
        <span data-field="ymid"></span>
        <span data-field="ymin"></span>
      </div>
      <div class="chart-svg" data-field="svg"></div>
      <div class="x-axis">
        <span>−16W</span>
        <span>−8W</span>
        <span>NOW</span>
      </div>
    </div>
  </template>

  <!-- One row of the exercise history log; cloned per session. -->
  <template id="tpl-history-log-row">
    <div class="detail-log-row">
      <span class="date" data-field="date"></span>
      <span class="sets" data-field="sets"></span>
      <span class="e1rm" data-field="e1rm"></span>
      <span data-field="pr"></span>
    </div>
  </template>

  <!-- Settings sheet (see ui/settings.js openSettings). -->
  <template id="tpl-settings">
    <div class="settings">
      <h2 class="eyebrow">SETTINGS</h2>

      <div class="eyebrow settings-section">DISPLAY UNITS</div>
      <div class="settings-units">
        <button type="button" class="pill toggle settings-unit" data-unit="kg">KG</button>
        <button type="button" class="pill toggle settings-unit" data-unit="lb">LB</button>
      </div>
      <div class="muted settings-hint">Stored internally as kg; this only changes display.</div>

      <div class="eyebrow settings-section">RECOVERY WINDOWS</div>
      <div class="settings-grid settings-recovery">
        <label class="settings-field">
          <span class="eyebrow">PRIMARY (HRS)</span>
          <input class="input input-center" type="number" name="recoveryPrimary" inputmode="numeric" min="1" step="1">
        </label>
        <label class="settings-field">
          <span class="eyebrow">SECONDARY (HRS)</span>
          <input class="input input-center" type="number" name="recoverySecondary" inputmode="numeric" min="1" step="1">
        </label>
      </div>
      <div class="muted settings-hint">Time a primary/secondary muscle hit takes to fully recover. Higher = more conservative suggestions.</div>

      <div class="eyebrow settings-section">DATA</div>
      <div class="muted settings-hint">Everything is stored in your browser. Export regularly — clearing site data wipes your history.</div>
      <div class="settings-grid settings-data">
        <button type="button" class="btn-secondary" data-act="export">EXPORT</button>
        <button type="button" class="btn-secondary" data-act="import">IMPORT</button>
      </div>

      <div class="settings-wipe">
        <button type="button" class="btn-secondary danger settings-wipe-btn" data-act="wipe">⌫ WIPE ALL DATA</button>
      </div>

      <button type="button" class="btn-primary settings-done" data-act="done">DONE</button>
    </div>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
