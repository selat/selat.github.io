<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="styles.css">
  <title>Wave Function Collapse</title>
</head>
<body>
  <canvas id="main"></canvas>
  <div id="hud">
    <div id="info"></div>
  </div>
  <div id="controls">
    <select id="approach" title="Approach"></select>
    <select id="preset" title="Preset"></select>
    <button id="playPause" title="Play/pause (space)">⏸</button>
    <label class="speed">
      <input type="range" id="speed" min="0" max="1" step="0.001" value="0.55">
      <span id="speedLabel"></span>
    </label>
    <button id="reset" title="Reset">↻</button>
    <div id="paramSliders"></div>
  </div>
  <script src="tiled.js"></script>
  <script src="overlapping.js"></script>
  <script src="script.js"></script>
</body>
</html>
