<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="styles.css">
  <title>Orbits</title>
</head>
<body>
  <canvas id="main"></canvas>
  <div id="side-panel">
    <div class="label">XZ side view</div>
    <canvas id="side"></canvas>
  </div>
  <div id="hud">
    <div id="coords"></div>
  </div>
  <div id="controls">
    <select id="preset" title="Preset">
      <option value="sunEarth">Sun + Earth</option>
      <option value="earthMoon">Earth + Moon</option>
      <option value="solarSystem" selected>Solar system</option>
      <option value="alphaCentauri">Alpha Centauri A/B</option>
      <option value="figure8">Figure-8 (3-body)</option>
      <option value="pythagorean">Pythagorean (3-4-5)</option>
      <option value="trojans">Sun + Jupiter + Trojans</option>
      <option value="inclined">Inclined triple</option>
      <option value="random">Random cluster</option>
    </select>
    <button id="playPause" title="Play/pause (space)">⏸</button>
    <label class="speed">
      <input type="range" id="speed" min="0" max="1" step="0.001" value="0.5">
      <span id="speedLabel"></span>
    </label>
    <button id="reset" title="Reset">↻</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
