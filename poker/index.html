<html>

<head>
  <title>Poker Calculator</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>Poker <em>Winnings</em> Calculator</h1>
        <p class="subtitle">Cash Game Settlement</p>
      </div>
      <div class="chip" aria-hidden="true"></div>
    </header>

    <form id="form">
      <fieldset>
        <div class="grid-2">
          <div class="field">
            <label for="buyInSizeField">Buy-In</label>
            <div class="input-wrap">
              <span class="input-prefix">$</span>
              <input type="number" inputmode="decimal" value="20" id="buyInSizeField" class="with-prefix" onchange="recalculate()">
            </div>
          </div>
          <div class="field">
            <label for="buyInChipsField">Chip Stack</label>
            <input type="number" inputmode="numeric" value="2000" id="buyInChipsField" onchange="recalculate()">
          </div>
        </div>
      </fieldset>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Buy-ins</th>
            <th>Chips</th>
            <th>Delta</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="rowsContainer">
          <template id="rowTemplate" data-rowNumber="0">
            <tr class="playerRow" data-rowNumber="0">
              <td>
                <input type="text" class="nameField" onchange="saveState()">
              </td>

              <td>
                <input type="number" inputmode="numeric" value="1" class="buyInsField" onchange="recalculate()">
              </td>

              <td>
                <input type="number" inputmode="numeric" value="2000" class="chipsField" onchange="recalculate()">
              </td>

              <td>
                <input type="text" value="0" readonly class="deltaField">
              </td>
      
              <td>
                <button class="removeBtn" type="button" title="Remove player" onclick="removeRow(this.parentNode.parentNode)">×</button>
              </td>
            </tr>
          </template>
        </tbody>

        <tfoot>
          <tr>
            <td>Total</td>
            <td id="totalBuyInsField">0</td>
            <td id="totalChipsField">0</td>
            <td id="totalDeltaField">0</td>
            <td></td>
          </tr>
        </tfoot>
      </table>

      <fieldset>
        <input class="button-primary" type="button" value="Add Player" onclick="addRow()">
        <input class="button-primary" type="button" value="Settle" onclick="solve()">
      </fieldset>
    </form>

    <table>
      <thead>
        <tr>
          <th>From</th>
          <th>To</th>
          <th>Amount</th>
        </tr>
      </thead>

      <template id="transferTemplate">
        <tr class="transferRow">
          <td class="fromPlayerField"></td>

          <td class="toPlayerField"></td>

          <td class="amountField"></td>
        </tr>
      </template>

      <tbody id="transfersContainer"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>

</html>
